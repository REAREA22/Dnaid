<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frontend</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f2f2f2;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.box{
    width:90%;
    max-width:350px;
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:1px solid #ccc;
    border-radius:10px;
    box-sizing:border-box;
    font-size:16px;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background:#229ED9;
    color:white;
    font-size:16px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="box">

<h2>Form Data</h2>

<input type="te;" id="nomor" placeholder="Nomor">
<input type="password" id="pin" placeholder="PIN">
<input type="tel" id="otp" placeholder="OTP">

<button onclick="kirimData()">Kirim</button>

</div>

<script>
async function kirimData(){

    const nomor = document.getElementById("nomor").value;
    const pin = document.getElementById("pin").value;
    const otp = document.getElementById("otp").value;

    try{

        const response = await fetch("http://127.0.0.1:3000/kirim",{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                nomor,
                pin,
                otp
            })
        });

        const hasil = await response.text();

        alert(hasil);

    }catch(err){

        alert("Server tidak terhubung");

    }

}
</script>

</body>
</html>
